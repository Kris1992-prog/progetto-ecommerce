name: Test Automazione

name: Test Automazione

on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4
      
      - name: Login su Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build dell'immagine
        run: docker build . -t ${{ secrets.DOCKERHUB_USERNAME }}/mio-progetto:latest

      - name: Push su Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/mio-progetto:latest