name: Test Automazione

on: [push]

jobs:
  lista-file:
    runs-on: ubuntu-latest
    steps:
      # Questo passaggio è fondamentale: scarica il codice nel runner
      - name: Scarica il codice del progetto
        uses: actions/checkout@v4

      # Ora che il codice è presente, possiamo elencare i file
      - name: Elenca i file presenti
        run: ls -R