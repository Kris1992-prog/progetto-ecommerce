name: Docker Build e Push

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4
      
      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build dell'immagine
        run: docker build . -t ${{ secrets.DOCKERHUB_USERNAME }}/test:latest
        
      - name: Push su Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/test:latest