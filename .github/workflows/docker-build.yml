name: Docker Build e Push

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

        - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Usiamo github.sha per creare un tag unico per ogni commit
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/test:${{ github.sha }}

          # --- QUI AGGIUNGIAMO IL TEST ---
      - name: Test dell'immagine
        run: |
          # Avvia il container in background
          docker run -d --name mio-container ${{ secrets.DOCKERHUB_USERNAME }}/test:${{ github.sha }}
          # Aspetta qualche secondo per l'avvio
          sleep 5
          # Controlla che il container sia ancora in esecuzione
          if [ "$(docker inspect -f '{{.State.Running}}' mio-container)" = "true" ]; then
            echo "Test superato: Il container è in esecuzione!"
          else
            echo "Test fallito: Il container è crashato!"
            exit 1
          fi